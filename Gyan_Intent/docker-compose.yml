version: '3.8'

services:
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8000
    env_file:
      - backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend/media:/app/media

  # WhatsApp Bot
  whatsapp-bot:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - REDIS_URL=redis://redis:6379
      - BACKEND_URL=http://backend:8000
      - PORT=3003
    env_file:
      - whatsapp-bot/.env
    depends_on:
      - redis
      - backend
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
      - whatsapp_cache:/app/.wwebjs_cache

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
  whatsapp_auth:
  whatsapp_cache:
